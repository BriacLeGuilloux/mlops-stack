trigger: none

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - prod

pool:
  name: local

variables:
  - group: mlops-secrets

stages:
  - stage: Infra
    displayName: Terraform
    jobs:
      - job: terraform
        steps:
          - script: |
              docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest init -reconfigure
            displayName: terraform init

          - script: |
              docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest apply -auto-approve -var-file=environments/${{ parameters.environment }}.tfvars
            displayName: terraform apply

          - script: |
              CSI_CLIENT_ID=$(docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest output -raw csi_client_id)
              echo "##vso[task.setvariable variable=CSI_CLIENT_ID;isOutput=true]$CSI_CLIENT_ID"
            name: tfOutput
            displayName: terraform output csi_client_id

  - stage: Deploy
    displayName: Helm deploy
    dependsOn: Infra
    variables:
      CSI_CLIENT_ID: $[ stageDependencies.Infra.terraform.outputs['tfOutput.CSI_CLIENT_ID'] ]
    jobs:
      - job: helm
        steps:
          - script: |
              az aks get-credentials \
                --resource-group mlops-${{ parameters.environment }} \
                --name mlops-aks-${{ parameters.environment }} \
                --overwrite-existing \
                --file $(pwd)/kubeconfig
            displayName: AKS credentials
            env:
              AZURE_CLIENT_ID: $(ARM_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              AZURE_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              docker run --rm \
                --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                -v $(pwd)/helm:/helm:ro \
                alpine/helm:latest upgrade --install mlops-stack /helm/mlops-stack \
                  --namespace mlops \
                  --create-namespace \
                  --values /helm/mlops-stack/values.yaml \
                  --values /helm/mlops-stack/values-${{ parameters.environment }}.yaml \
                  --set secretProviderClass.clientId=$(CSI_CLIENT_ID) \
                  --wait --timeout 5m
            displayName: helm upgrade

          - script: |
              echo "=== pods ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get pods -n mlops -o wide

              echo "=== events ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get events -n mlops --sort-by='.lastTimestamp'

              echo "=== orchestrator logs ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n mlops -l app=orchestrator --tail=100 --previous || true

              echo "=== worker logs ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n mlops -l app=worker --tail=100 --previous || true

              echo "=== describe orchestrator ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest describe pods -n mlops -l app=orchestrator

              echo "=== describe worker ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest describe pods -n mlops -l app=worker
            displayName: kubectl diagnostic
            condition: always()

  - stage: Smoke
    displayName: Smoke test
    dependsOn: Deploy
    jobs:
      - job: smoke
        steps:
          - script: |
              az aks get-credentials \
                --resource-group mlops-${{ parameters.environment }} \
                --name mlops-aks-${{ parameters.environment }} \
                --overwrite-existing \
                --file $(pwd)/kubeconfig
            displayName: AKS credentials
            env:
              AZURE_CLIENT_ID: $(ARM_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              AZURE_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              WORKER_URL=$(docker run --rm \
                --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get svc orchestrator -n mlops \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://$WORKER_URL:8080/api/demo/start")
              if [ "$STATUS" != "202" ]; then
                echo "Smoke test failed: expected 202, got $STATUS"
                exit 1
              fi
              echo "Smoke test passed"
            displayName: POST /api/demo/start
