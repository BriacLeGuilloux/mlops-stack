trigger: none

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - prod

pool:
  name: local

variables:
  - group: mlops-secrets

stages:
  - stage: Infra
    displayName: Terraform
    jobs:
      - job: terraform
        steps:
          - script: |
              docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest init -reconfigure
            displayName: terraform init

          - script: |
              docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest plan \
                  -var-file=environments/${{ parameters.environment }}.tfvars \
                  -out=tfplan
            displayName: terraform plan

          - script: |
              docker run --rm \
                --network host \
                --user 1000:1000 \
                -e ARM_CLIENT_ID=$(ARM_CLIENT_ID) \
                -e ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -e ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID) \
                -e ARM_TENANT_ID=$(ARM_TENANT_ID) \
                -e TF_LOG=INFO \
                -v $(pwd)/terraform:/workspace \
                -w /workspace \
                hashicorp/terraform:latest apply -auto-approve tfplan
            displayName: terraform apply

  - stage: Deploy
    displayName: Helm deploy
    dependsOn: Infra
    jobs:
      - job: helm
        steps:
          - script: |
              az aks get-credentials \
                --resource-group mlops-${{ parameters.environment }} \
                --name mlops-${{ parameters.environment }}-aks \
                --overwrite-existing \
                --file $(pwd)/kubeconfig
              chmod 644 $(pwd)/kubeconfig
            displayName: AKS credentials
            env:
              AZURE_CLIENT_ID: $(ARM_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              AZURE_TENANT_ID: $(ARM_TENANT_ID)

          # Use sh -c inside the container to avoid heredoc + -i issues.
          # Secrets are passed as env vars; kubectl dry-run | apply is idempotent.
          - script: |
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -e CLIENT_ID=$(ARM_CLIENT_ID) \
                -e CLIENT_SECRET=$(ARM_CLIENT_SECRET) \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest sh -c '
                  kubectl create namespace mlops --dry-run=client -o yaml | kubectl apply -f - &&
                  kubectl create secret generic secrets-store-creds \
                    --namespace mlops \
                    --from-literal=clientid="$CLIENT_ID" \
                    --from-literal=clientsecret="$CLIENT_SECRET" \
                    --dry-run=client -o yaml | kubectl apply -f -
                '
            displayName: bootstrap mlops namespace and SP secret

          - script: |
              echo "=== verify secret exists ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get secret secrets-store-creds -n mlops -o jsonpath='{.metadata.name}'
              echo ""

              echo "=== verify secret keys (base64 length as proof of presence) ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get secret secrets-store-creds -n mlops \
                  -o jsonpath='clientid key length: {.data.clientid} | clientsecret key length: {.data.clientsecret}'
              echo ""

              echo "=== current SecretProviderClass ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest describe secretproviderclass mlops-secrets-provider -n mlops
            displayName: verify bootstrap

          - script: |
              docker run --rm \
                --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                -v $(pwd)/helm:/helm:ro \
                alpine/helm:latest upgrade --install mlops-stack /helm/mlops-stack \
                  --namespace mlops \
                  --create-namespace \
                  --values /helm/mlops-stack/values.yaml \
                  --values /helm/mlops-stack/values-${{ parameters.environment }}.yaml
            displayName: helm upgrade

          - script: |
              echo "=== rollout restart ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest rollout restart \
                  deployment/orchestrator deployment/worker -n mlops

              echo "=== wait for orchestrator ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest rollout status deployment/orchestrator -n mlops --timeout=10m

              echo "=== wait for worker ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest rollout status deployment/worker -n mlops --timeout=10m
            displayName: rollout restart and wait

          - script: |
              echo "=== pods ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get pods -n mlops -o wide

              echo "=== events (mlops) ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get events -n mlops --sort-by='.lastTimestamp'

              echo "=== SecretProviderClass applied ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get secretproviderclass -n mlops -o yaml

              echo "=== CSI driver pods in kube-system ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get pods -n kube-system | grep -E 'secret|csi' || echo "none found"

              echo "=== CSI Azure provider logs ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n kube-system \
                  -l app=csi-secrets-store-provider-azure --tail=80 2>/dev/null || \
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n kube-system \
                  -l app=secrets-store-csi-driver --tail=80 2>/dev/null || \
              echo "CSI provider pod not found with known labels, check kube-system pods above"

              echo "=== orchestrator logs (current) ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n mlops -l app=orchestrator --tail=100 || true

              echo "=== worker logs (current) ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest logs -n mlops -l app=worker --tail=100 || true

              echo "=== describe orchestrator pod ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest describe pods -n mlops -l app=orchestrator

              echo "=== describe worker pod ==="
              docker run --rm --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest describe pods -n mlops -l app=worker
            displayName: kubectl diagnostic
            condition: always()

  - stage: Smoke
    displayName: Smoke test
    dependsOn: Deploy
    jobs:
      - job: smoke
        steps:
          - script: |
              az aks get-credentials \
                --resource-group mlops-${{ parameters.environment }} \
                --name mlops-${{ parameters.environment }}-aks \
                --overwrite-existing \
                --file $(pwd)/kubeconfig
              chmod 644 $(pwd)/kubeconfig
            displayName: AKS credentials
            env:
              AZURE_CLIENT_ID: $(ARM_CLIENT_ID)
              AZURE_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              AZURE_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              WORKER_URL=$(docker run --rm \
                --network host \
                -e KUBECONFIG=/kubeconfig \
                -v $(pwd)/kubeconfig:/kubeconfig:ro \
                bitnami/kubectl:latest get svc orchestrator -n mlops \
                  -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://$WORKER_URL:8080/api/demo/start")
              if [ "$STATUS" != "202" ]; then
                echo "Smoke test failed: expected 202, got $STATUS"
                exit 1
              fi
              echo "Smoke test passed"
            displayName: POST /api/demo/start
