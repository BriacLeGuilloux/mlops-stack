apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: mlops
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: mlops-secrets-provider
      containers:
        - name: orchestrator
          image: {{ .Values.orchestrator.image }}
          ports:
            - containerPort: {{ .Values.orchestrator.port }}
          envFrom:
            - configMapRef:
                name: mlops-config
            - secretRef:
                name: mlops-secrets
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
