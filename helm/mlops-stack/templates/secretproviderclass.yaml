apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mlops-secrets-provider
  namespace: mlops
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: ""
    keyvaultName: {{ .Values.secretProviderClass.keyvaultName }}
    tenantId: {{ .Values.secretProviderClass.tenantId }}
    objects: |
      array:
        - |
          objectName: azure-storage-conn-str
          objectType: secret
  secretObjects:
    - secretName: mlops-secrets
      type: Opaque
      data:
        - objectName: azure-storage-conn-str
          key: AZURE_STORAGE_CONN_STR
